<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe — Chalkboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <filter id="chalk" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.06" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="chalkThick" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.09" numOctaves="2" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<main class="board-room">
  <header class="header">
    <h1 class="title">tic&nbsp;·&nbsp;tac&nbsp;·&nbsp;toe</h1>
    <p class="subtitle">two players, one board, no eraser needed</p>
  </header>

  <p class="status" id="status" role="status" aria-live="polite">X goes first</p>

  <div class="table">
    <section class="tally" aria-label="score for X">
      <span class="tally-label">X</span>
      <svg class="tally-marks" id="tallyX" viewBox="0 0 120 40"></svg>
    </section>

    <section class="board-wrap">
      <svg class="grid-lines" viewBox="0 0 300 300" aria-hidden="true">
        <line x1="100" y1="12" x2="98" y2="288" filter="url(#chalk)"/>
        <line x1="200" y1="14" x2="202" y2="286" filter="url(#chalk)"/>
        <line x1="12" y1="100" x2="288" y2="98" filter="url(#chalk)"/>
        <line x1="14" y1="200" x2="286" y2="202" filter="url(#chalk)"/>
      </svg>
      <svg class="strike-line" id="strike" viewBox="0 0 300 300" aria-hidden="true"></svg>
      <div class="board" id="board" role="grid" aria-label="tic tac toe board"></div>
    </section>

    <section class="tally" aria-label="score for O">
      <span class="tally-label">O</span>
      <svg class="tally-marks" id="tallyO" viewBox="0 0 120 40"></svg>
    </section>
  </div>

  <div class="controls">
    <button class="btn" id="resetBoard">wipe the board</button>
    <button class="btn btn-ghost" id="resetScore">clear the tally</button>
  </div>

  <p class="draws-note" id="drawsNote"></p>
</main>

<script src="script.js"></script>
</body>
</html>
